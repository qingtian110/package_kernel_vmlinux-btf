name: Build Packages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [pkg]

jobs:
  build:
    name: Build ${{ matrix.arch }}-${{ matrix.sdk }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64_generic
          - x86_64
        sdk:
          - openwrt-24.10
          - openwrt-25.12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hack aarch64 depends
        run: |
          sed -i 's/@TARGET_rockchip/@(aarch64)/' vmlinux-btf/Makefile

      - name: Get latest release tag
        run: |
          tag=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r .tag_name)
          echo "latest_tag=$tag" >> $GITHUB_ENV

      - name: Build Packages
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: vmlinux-btf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-${{ matrix.sdk }}
          path: |
            bin/packages/${{ matrix.arch }}/packages_ci/*.apk
            bin/packages/${{ matrix.arch }}/packages_ci/*.ipk

      - name: Upload packages
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.latest_tag }}
          name: ${{ env.latest_tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          prerelease: false
          artifacts: "bin/packages/${{ matrix.arch }}/packages_ci/vmlinux-btf-*.*"
